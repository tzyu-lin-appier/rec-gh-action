name: Auto Smoke Test & PR Ready on CI Success

on:
  workflow_dispatch:

jobs:
  auto-ready-pr:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: write
      issues: write
      contents: write
    env:
      ALLOWED_URL_REGEX: "^https?://[a-zA-Z0-9.-]+\\.svc\\.cluster\\.local(:[0-9]+)?(/.*)?$"
      TARGET_BRANCH: main

    steps:
      - name: Checkout Target Commit
        uses: actions/checkout@v4
      
      - name: Set Check Status to Pending
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ github.event.sha || github.sha }}
          status: pending
          context: 'Auto Smoke Test'
          description: 'Smoke Test is running...'

      - name: Validate Smoke Test Config
        id: config
        run: |
          CONFIG_FILE=".github/smoke_test.json"
          if [ ! -f "$CONFIG_FILE" ] || [ "$(jq -r '.enabled // false' "$CONFIG_FILE")" != "true" ]; then
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "Smoke test disabled or config not found."
            exit 0
          fi
          
          URL=$(jq -r '.url // ""'   "$CONFIG_FILE")
          # if [[ ! "$URL" =~ $ALLOWED_URL_REGEX ]]; then
          #   echo "Security Error: Target URL ($URL) does not match the allowed internal domains."
          #   echo "enabled=true" >> $GITHUB_OUTPUT
          #   echo "config_error=URL_REJECTED" >> $GITHUB_OUTPUT
          #   echo "url=$URL" >> $GITHUB_OUTPUT
          #   exit 0
          # fi
          
          LINES=$(jq -r '.preview_lines // 15' "$CONFIG_FILE")
          if ! [[ "$LINES" =~ ^[0-9]+$ ]]; then
            echo "Warning: preview_lines is not a valid number. Defaulting to 15."
            LINES=15
          fi
          
          echo "enabled=true" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "preview_lines=$LINES" >> $GITHUB_OUTPUT
          echo "Config validated successfully."

      - name: Execute Smoke Test
        id: smoke_test
        if: steps.config.outputs.enabled == 'true' && !steps.config.outputs.config_error
        env:
          TARGET_URL: ${{ steps.config.outputs.url }}
          PREVIEW_LINES: ${{ steps.config.outputs.preview_lines }}
        run: |
          echo "Smoke test URL: $TARGET_URL"

          HTTP_CODE=$(curl --proto '=http,https' --retry 5 --retry-delay 5 --retry-all-errors -s -o full_response.json -w "%{http_code}" "$TARGET_URL") || true
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            jq '.' full_response.json > full_formatted.json 2>/dev/null || cat full_response.json > full_formatted.json
            head -n "$PREVIEW_LINES" full_formatted.json > response.txt

            TOTAL_LINES=$(wc -l < full_formatted.json | tr -d ' ')
            SHOWN_LINES=$(wc -l < response.txt | tr -d ' ')

            EOF_MARKER="EOF_$(date +%s)"
            {
              echo "api_sample<<$EOF_MARKER"
              cat response.txt
              if [ "$TOTAL_LINES" -gt "$SHOWN_LINES" ]; then
                echo "... (${TOTAL_LINES} total lines, showing first ${SHOWN_LINES})"
              fi
              printf "\n"
              echo "$EOF_MARKER"
            } >> "$GITHUB_OUTPUT"
            echo "Smoke test passed (HTTP $HTTP_CODE)"
          else
            echo "Smoke test failed (HTTP $HTTP_CODE)"
          fi

      - name: Comment and Mark PR Ready
        id: process_pr
        uses: actions/github-script@v7
        env:
          SMOKE_ENABLED: ${{ steps.config.outputs.enabled }}
          SMOKE_URL: ${{ steps.config.outputs.url }}
          SMOKE_HTTP_CODE: ${{ steps.smoke_test.outputs.http_code }}
          SMOKE_CONFIG_ERROR: ${{ steps.config.outputs.config_error }}
          SMOKE_RESPONSE_SAMPLE: ${{ steps.smoke_test.outputs.api_sample }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const targetBranch = process.env.TARGET_BRANCH;
            
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, head: `${owner}:${targetBranch}`, state: 'open', per_page: 1
            });
            if (prs.length === 0) return core.info("No open PR found.");
            
            const pr = prs[0];
            const isSmokeEnabled = process.env.SMOKE_ENABLED === 'true';
            const configError = process.env.SMOKE_CONFIG_ERROR;
            const httpCode = parseInt(process.env.SMOKE_HTTP_CODE, 10);
            const isSmokeFailed = isSmokeEnabled && (configError || isNaN(httpCode) || httpCode >= 400);
            const shouldMarkReady = pr.draft && !isSmokeFailed;

            core.setOutput('smoke_failed', isSmokeFailed ? 'true' : 'false');
            
            // Construct the comment content
            const marker = "<!-- SMOKE_TEST_COMMENT_MARKER -->";
            const lines = [marker];
            
            if (isSmokeFailed) {
              lines.push("### 🔴 Smoke Test: FAILED");
              lines.push("The PR will remain in Draft status until the endpoint is reachable.");
            } else {
              lines.push("### 🟢 Smoke Test: PASSED");
              if (shouldMarkReady) {
                lines.push("This PR has been automatically marked as ready for review.");
              }
            }
    
            lines.push("");
            
            if (isSmokeEnabled) {
              lines.push(`- **URL:** [${process.env.SMOKE_URL}](${process.env.SMOKE_URL})`);
              const statusDetail = configError || process.env.SMOKE_HTTP_CODE || 'N/A';
              lines.push(`- **HTTP Status:** ${statusDetail}`);
            
              if (process.env.SMOKE_RESPONSE_SAMPLE) {
                lines.push("");
                lines.push("<details><summary>Click to expand API Response</summary>");
                lines.push("");
                lines.push("```json");
                lines.push(process.env.SMOKE_RESPONSE_SAMPLE);
                lines.push("```");
                lines.push("");
                lines.push("</details>");
              }
            }
            
            const bodyContent = lines.join('\n');
            
            // Find the previous comment
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr.number
            });
            const existingComment = comments.find(c => c.body.includes(marker));
            
            if (existingComment) {
              await github.rest.issues.deleteComment({
                owner, repo, comment_id: existingComment.id
              });
              core.info("Deleted old smoke test comment.");
            }
            
            await github.rest.issues.createComment({
              owner, repo, issue_number: pr.number, body: bodyContent
            });
            core.info("Created new smoke test comment at the bottom of the PR.");
            
            if (shouldMarkReady) {
              await github.graphql(`
                mutation($id: ID!) {
                  markPullRequestReadyForReview(input: {pullRequestId: $id}) {
                    pullRequest { id }
                  }
                }
              `, { id: pr.node_id });
              core.info(`PR #${pr.number} marked as ready.`);
            }

      - name: Set Final Check Status
        if: always()
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ github.event.sha || github.sha }}
          status: ${{ steps.process_pr.outputs.smoke_failed == 'true' && 'failure' || 'success' }}
          context: 'Auto Smoke Test'
          description: ${{ steps.process_pr.outputs.smoke_failed == 'true' && 'Smoke Test failed' || 'Smoke Test passed' }}