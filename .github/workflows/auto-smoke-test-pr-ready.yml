name: Auto Smoke Test

on:
  workflow_dispatch:

jobs:
  register-and-check:
    runs-on: ubuntu-latest
    outputs:
      branch_found: ${{ steps.extract_branch.outputs.branch_found }}
      branch_name: ${{ steps.extract_branch.outputs.branch }}
    permissions:
      statuses: write
    
    steps:
      - name: Set Check Status to Pending
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ github.token }}
          sha: ${{ github.event.sha || github.sha }}
          status: pending
          context: 'Auto Smoke Test'
          description: 'Smoke Test is running...'

      - name: Extract Branch
        id: extract_branch
        uses: actions/github-script@v7
        env:
          BRANCH_PREFIX: "main/"
        with:
          script: |
            const branchPrefix = process.env.BRANCH_PREFIX;
            const branches = context.payload.branches || ["main"];
            const target = branches.find(b => b.name.startsWith(branchPrefix));
            if (target) {
              core.setOutput('branch_found', 'true');
              core.setOutput('branch', target.name);
            } else {
              core.setOutput('branch_found', 'false');
            }

      - name: Set Check Status (Exit Early)
        if: steps.extract_branch.outputs.branch_found == 'false'
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ github.token }}
          sha: ${{ github.event.sha || github.sha }}
          status: success
          context: 'Auto Smoke Test'
          description: 'Skipped: No automated/ branch detected.'

      - name: Set Check Status (Unexpected Failure)
        if: failure()
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ github.token }}
          sha: ${{ github.event.sha || github.sha }}
          status: failure
          context: 'Auto Smoke Test'
          description: 'Workflow Error: Failed to extract branch information.'
          
  smoke-test:
    needs: register-and-check
    if: needs.register-and-check.outputs.branch_found == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      statuses: write
      pull-requests: write  
      contents: read
    env:
      ALLOWED_URL_REGEX: "^https?://[a-zA-Z0-9.-]+\\.svc\\.cluster\\.local(:[0-9]+)?(/.*)?$"

    steps:
      - name: Checkout Source Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.sha || github.sha }}

      - name: Validate Smoke Test Config
        id: config
        env:
          CONFIG_FILE: ".github/smoke_test.json"
        run: |
          if [ ! -f "$CONFIG_FILE" ] || [ "$(jq -r '.enabled // false' "$CONFIG_FILE")" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Smoke test disabled or config not found."
            exit 0
          fi
          
          URL=$(jq -r '.url // ""'   "$CONFIG_FILE")
          if [[ ! "$URL" =~ $ALLOWED_URL_REGEX ]]; then
            echo "Security Error: Target URL ($URL) does not match the allowed internal domains."
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "config_error=URL_REJECTED" >> "$GITHUB_OUTPUT"
            echo "url=$URL" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          LINES=$(jq -r '.preview_lines // 15' "$CONFIG_FILE")
          if ! [[ "$LINES" =~ ^[0-9]+$ ]]; then
            echo "Warning: preview_lines is not a valid number. Defaulting to 15."
            LINES=15
          fi
          
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "preview_lines=$LINES" >> "$GITHUB_OUTPUT"
          echo "Config validated successfully."

      - name: Execute Smoke Test
        id: smoke_test
        if: steps.config.outputs.enabled == 'true' && !steps.config.outputs.config_error
        env:
          TARGET_URL: ${{ steps.config.outputs.url }}
          PREVIEW_LINES: ${{ steps.config.outputs.preview_lines }}
        run: |
          echo "Smoke test URL: $TARGET_URL"

          HTTP_CODE=$(curl --proto '=http,https' --max-time 10 --retry 5 --retry-delay 5 --retry-all-errors -s -o full_response.json -w "%{http_code}" "$TARGET_URL") || true
          HTTP_CODE=${HTTP_CODE:-000}
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            jq '.' full_response.json > full_formatted.json 2>/dev/null || cp full_response.json full_formatted.json
            
            head -n "$PREVIEW_LINES" full_formatted.json > response.txt

            TOTAL_LINES=$(wc -l < full_formatted.json | tr -d ' ')
            SHOWN_LINES=$(wc -l < response.txt | tr -d ' ')

            EOF_MARKER="EOF_$(date +%s)"
            
            {
              echo "api_sample<<$EOF_MARKER"
              cat response.txt
              if [ "$TOTAL_LINES" -gt "$SHOWN_LINES" ]; then
                echo "... (${TOTAL_LINES} total lines, showing first ${SHOWN_LINES})"
              fi
              echo ""
              echo "$EOF_MARKER"
            } >> "$GITHUB_OUTPUT"

            echo "Smoke test passed (HTTP $HTTP_CODE)"
          else
            echo "Smoke test failed (HTTP $HTTP_CODE)"
          fi

      - name: Prepare Comment Body
        id: prepare_body
        env:
          SMOKE_ENABLED: ${{ steps.config.outputs.enabled }}
          SMOKE_URL: ${{ steps.config.outputs.url }}
          SMOKE_HTTP_CODE: ${{ steps.smoke_test.outputs.http_code }}
          SMOKE_CONFIG_ERROR: ${{ steps.config.outputs.config_error }}
          SMOKE_RESPONSE_SAMPLE: ${{ steps.smoke_test.outputs.api_sample }}
        run: |
          IS_FAILED="false"
          if [ "$SMOKE_ENABLED" = "true" ]; then
            if [ -n "$SMOKE_CONFIG_ERROR" ] || [ "$SMOKE_HTTP_CODE" -lt 200 ] || [ "$SMOKE_HTTP_CODE" -ge 400 ]; then
              IS_FAILED="true"
            fi
          fi
          echo "smoke_failed=$IS_FAILED" >> "$GITHUB_OUTPUT"

          EOF_MARKER="EOF_$(date +%s)"
          { 
            echo "comment_body<<$EOF_MARKER"
            if [ "$SMOKE_ENABLED" != "true" ]; then
              echo "### ⚪ Smoke Test: SKIPPED"
              echo "Smoke test is disabled in \`.github/smoke_test.json\`."
            elif [ "$IS_FAILED" = "true" ]; then
              echo "### 🔴 Smoke Test: FAILED"
            else
              echo "### 🟢 Smoke Test: PASSED"
            fi
            
            echo ""
            if [ "$SMOKE_ENABLED" = "true" ]; then
              echo "- **URL:** [$SMOKE_URL]($SMOKE_URL)"
              STATUS_DETAIL="${SMOKE_CONFIG_ERROR:-$SMOKE_HTTP_CODE}"
              echo "- **HTTP Status:** ${STATUS_DETAIL:-N/A}"
              
              if [ -n "$SMOKE_RESPONSE_SAMPLE" ]; then
                echo ""
                echo "<details><summary>Click to expand API Response</summary>"
                echo ""
                echo " \`\`\`json"
                echo "$SMOKE_RESPONSE_SAMPLE"
                echo " \`\`\` "
                echo "</details>"
              fi
            fi
            echo "$EOF_MARKER"
          } >> "$GITHUB_OUTPUT"
      
      - name: Find Pull Request Number
        id: find_pr
        uses: actions/github-script@v7
        env:
          SRC_BRANCH: ${{ needs.register-and-check.outputs.branch_name }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const srcBranch = process.env.SRC_BRANCH;
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, head: `${owner}:${srcBranch}`, state: 'open', per_page: 1
            });
            if (prs.length > 0) {
              core.setOutput('number', prs[0].number);
            }

      - name: Post or Update Comment
        if: steps.find_pr.outputs.number
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.find_pr.outputs.number }}
          header: auto-smoke-test-report
          hide_and_recreate: true
          hide_classify: "OUTDATED"
          message: ${{ steps.prepare_body.outputs.comment_body }}

      - name: Set Final Check Status
        if: always()
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ github.token }}
          sha: ${{ github.event.sha || github.sha }}
          status: ${{steps.prepare_body.outputs.smoke_failed == 'false' && 'success' || 'failure' }}
          context: 'Auto Smoke Test'
          description: ${{steps.prepare_body.outputs.smoke_failed == 'false' && 'Smoke Test passed' || 'Smoke Test failed' }}